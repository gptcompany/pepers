name: Bug Report
description: Report a bug in PePeRS
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect?
  - type: dropdown
    id: service
    attributes:
      label: Which service?
      options:
        - Discovery (:8770)
        - Analyzer (:8771)
        - Extractor (:8772)
        - Validator (:8773)
        - Codegen (:8774)
        - Orchestrator (:8775)
        - MCP Server (:8776)
        - Setup Wizard
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
