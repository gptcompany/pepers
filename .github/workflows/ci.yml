name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "catalog-info.yaml"
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "catalog-info.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "test / python-${{ matrix.python-version }}"
    runs-on: ${{ matrix.runner }}
    env:
      PROGRESSIVE_DEPLOY_TOKEN: ${{ secrets.PAT }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, X64, sam-workstation]]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra setup

      - name: Smoke setup CLI help
        run: uv run python -m services.setup.main --help

      - name: Setup wizard tests
        run: uv run pytest -q tests/unit/test_setup_wizard.py tests/unit/test_setup_easy.py

      - name: Unit suite (Linux only)
        if: runner.os == 'Linux'
        run: uv run pytest tests/unit --cov=services --cov-report=term --cov-report=json

      - name: Property tests (Linux only)
        if: runner.os == 'Linux'
        run: uv run pytest tests/property -v

      - name: Extract coverage percentage
        if: runner.os == 'Linux'
        id: cov
        run: |
          COV=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "pct=$COV" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        id: badge
        if: runner.os == 'Linux' && github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cov.outputs.pct
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ac39e6516b7114f96b84ba445b8e7a83
          filename: pepers-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 40
          maxColorRange: 90

      - name: Warn if coverage badge update failed
        if: always() && runner.os == 'Linux' && github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cov.outputs.pct && steps.badge.outcome == 'failure'
        run: |
          echo "::warning::Coverage badge update failed. Check GIST_TOKEN validity/scope and gist access for ac39e6516b7114f96b84ba445b8e7a83."

      - name: Extract Metadata
        id: meta
        run: |
          VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Resolve dispatch token via dotenvx (self-hosted fallback)
        id: tokens
        env:
          RP_VERSION: ${{ steps.meta.outputs.version }}
          RP_COMMIT_SHA: ${{ steps.meta.outputs.sha }}
          RP_BUILD_AT: ${{ steps.meta.outputs.build_at }}
        run: |
          TOKEN="${{ secrets.PAT }}"
          if [[ -z "$TOKEN" ]] && command -v dotenvx &> /dev/null && [[ -f .env ]]; then
             echo "Resolving token via dotenvx on self-hosted runner..."
             TOKEN=$(dotenvx get GITHUB_PAT || dotenvx get PAT || true)
          fi
          if [[ -n "$TOKEN" ]]; then
            echo "pd_token=$TOKEN" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$TOKEN"
          fi

      - name: Trigger progressive-deploy build
        id: progressive_dispatch
        env:
          PD_TOKEN: ${{ steps.tokens.outputs.pd_token }}
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && env.PD_TOKEN != ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.tokens.outputs.pd_token }}
          repository: gptcompany/progressive-deploy
          event-type: pepers-build
          client-payload: >-
            {"ref":"${{ github.sha }}","version":"${{ steps.meta.outputs.version }}","commit_sha":"${{ steps.meta.outputs.sha }}","build_at":"${{ steps.meta.outputs.build_at }}","source_repo":"${{ github.repository }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}","source_workflow":"${{ github.workflow }}"}

      - name: Warn if progressive-deploy dispatch was skipped
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.tokens.outputs.pd_token == ''
        run: |
          echo "::warning::Skipping progressive-deploy dispatch because PAT is not configured for this workflow."

      - name: Warn if progressive-deploy dispatch failed
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.tokens.outputs.pd_token != '' && steps.progressive_dispatch.outcome == 'failure'
        run: |
          echo "::warning::progressive-deploy dispatch failed. Check PAT validity/scope and access to gptcompany/progressive-deploy."
