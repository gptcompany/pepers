name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "catalog-info.yaml"
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "catalog-info.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "test / python-${{ matrix.python-version }}"
    runs-on: ${{ matrix.runner }}
    env:
      PROGRESSIVE_DEPLOY_TOKEN: ${{ secrets.PAT }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, X64]]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra setup

      - name: Smoke setup CLI help
        run: uv run python -m services.setup.main --help

      - name: Setup wizard tests
        run: uv run pytest -q tests/unit/test_setup_wizard.py tests/unit/test_setup_easy.py

      - name: Unit suite (Linux only)
        if: runner.os == 'Linux'
        run: uv run pytest tests/unit --cov=services --cov-report=term --cov-report=json

      - name: Property tests (Linux only)
        if: runner.os == 'Linux'
        run: uv run pytest tests/property -v

      - name: Extract coverage percentage
        if: runner.os == 'Linux'
        id: cov
        run: |
          COV=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "pct=$COV" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        id: badge
        if: runner.os == 'Linux' && github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cov.outputs.pct
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ac39e6516b7114f96b84ba445b8e7a83
          filename: pepers-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 40
          maxColorRange: 90

      - name: Warn if coverage badge update failed
        if: always() && runner.os == 'Linux' && github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cov.outputs.pct && steps.badge.outcome == 'failure'
        run: |
          echo "::warning::Coverage badge update failed. Check GIST_TOKEN validity/scope and gist access for ac39e6516b7114f96b84ba445b8e7a83."

      - name: Trigger progressive-deploy build
        id: progressive_dispatch
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && env.PROGRESSIVE_DEPLOY_TOKEN != ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.PROGRESSIVE_DEPLOY_TOKEN }}
          repository: gptcompany/progressive-deploy
          event-type: pepers-build
          client-payload: >-
            {"ref":"${{ github.sha }}","source_repo":"${{ github.repository }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}","source_workflow":"${{ github.workflow }}"}

      - name: Warn if progressive-deploy dispatch was skipped
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && env.PROGRESSIVE_DEPLOY_TOKEN == ''
        run: |
          echo "::warning::Skipping progressive-deploy dispatch because PAT is not configured for this workflow."

      - name: Warn if progressive-deploy dispatch failed
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && env.PROGRESSIVE_DEPLOY_TOKEN != '' && steps.progressive_dispatch.outcome == 'failure'
        run: |
          echo "::warning::progressive-deploy dispatch failed. Check PAT validity/scope and access to gptcompany/progressive-deploy."
