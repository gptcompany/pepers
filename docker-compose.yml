name: pepers

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-deploy-service: &default-deploy
  resources:
    limits:
      memory: 512m

x-deploy-orchestrator: &orchestrator-deploy
  resources:
    limits:
      memory: 1g

x-runtime-service: &runtime-service
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  discovery:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: discovery
    init: true
    <<: *runtime-service
    ports:
      - "127.0.0.1:${RP_DISCOVERY_PORT:-8770}:${RP_DISCOVERY_PORT:-8770}"
    environment:
      - RP_DISCOVERY_PORT=${RP_DISCOVERY_PORT:-8770}
      - RP_DB_PATH=/data/research.db
      - RP_DISCOVERY_SOURCES=arxiv,openalex
      - RP_DOCKER_HOST_GATEWAY=host.docker.internal
      - RP_LOG_LEVEL=INFO
    env_file: .env
    volumes:
      - ${PEPERS_DATA_DIR:-./data}:/data
    user: "${PEPERS_UID:-1000}:${PEPERS_GID:-1000}"
    restart: always
    logging: *default-logging
    deploy: *default-deploy
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:${RP_DISCOVERY_PORT:-8770}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: analyzer
    init: true
    <<: *runtime-service
    ports:
      - "127.0.0.1:${RP_ANALYZER_PORT:-8771}:${RP_ANALYZER_PORT:-8771}"
    environment:
      - RP_ANALYZER_PORT=${RP_ANALYZER_PORT:-8771}
      - RP_DB_PATH=/data/research.db
      - RP_ANALYZER_THRESHOLD=0.7
      - RP_ANALYZER_MAX_PAPERS=10
      - RP_ANALYZER_LLM_FALLBACK_ORDER=${RP_ANALYZER_LLM_FALLBACK_ORDER:-gemini_cli,gemini_sdk}
      - RP_ANALYZER_REQUEST_BUDGET_SECONDS=900
      - RP_LLM_TIMEOUT_GEMINI_CLI=${RP_LLM_TIMEOUT_GEMINI_CLI:-60}
      - RP_LLM_TIMEOUT_GEMINI_SDK=20
      - RP_LLM_TIMEOUT_OPENROUTER=20
      - RP_LLM_TIMEOUT_OLLAMA=${RP_LLM_TIMEOUT_OLLAMA:-120}
      - RP_DOCKER_HOST_GATEWAY=host.docker.internal
      - RP_LOG_LEVEL=INFO
      - HOME=/home/pepers
      - RP_GEMINI_CLI_USE_OAUTH=${RP_GEMINI_CLI_USE_OAUTH:-true}
    env_file: .env
    volumes:
      - ${PEPERS_DATA_DIR:-./data}:/data
      - ${PEPERS_HOST_HOME:-/home/sam}/.gemini:/home/pepers/.gemini
      - ${PEPERS_HOST_HOME:-/home/sam}/.config/gemini:/home/pepers/.config/gemini:ro
      - ${PEPERS_HOST_HOME:-/home/sam}/.config/gcloud:/home/pepers/.config/gcloud:ro
      - /media/sam/1TB/gemini-config:/media/sam/1TB/gemini-config:ro
      - ./config/gemini-settings-container.json:/home/pepers/.gemini/settings.json:ro
    user: "${PEPERS_UID:-1000}:${PEPERS_GID:-1000}"
    restart: always
    logging: *default-logging
    deploy: *default-deploy
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:${RP_ANALYZER_PORT:-8771}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      discovery:
        condition: service_healthy
        restart: true

  extractor:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: extractor
    init: true
    <<: *runtime-service
    ports:
      - "127.0.0.1:${RP_EXTRACTOR_PORT:-8772}:${RP_EXTRACTOR_PORT:-8772}"
    environment:
      - RP_EXTRACTOR_PORT=${RP_EXTRACTOR_PORT:-8772}
      - RP_DB_PATH=/data/research.db
      - RP_EXTRACTOR_MAX_PAPERS=10
      - RP_EXTRACTOR_PDF_DIR=/rag-data/pdfs
      - RP_EXTRACTOR_PDF_HOST_DIR=${RAG_DATA_HOST:-${RAG_DATA_PATH:-../rag-service/data}}/pdfs
      - RP_EXTRACTOR_PROJECT_HOST_DIR=${PEPERS_PROJECT_HOST_DIR:-${PWD}}
      - RP_EXTRACTOR_RAG_URL=${RP_EXTRACTOR_RAG_URL:-http://localhost:8767}
      - RP_EXTRACTOR_RAG_REQUEST_TIMEOUT=${RP_EXTRACTOR_RAG_REQUEST_TIMEOUT:-30}
      - RP_EXTRACTOR_RAG_SUBMIT_TIMEOUT=${RP_EXTRACTOR_RAG_SUBMIT_TIMEOUT:-60}
      - RP_EXTRACTOR_RAG_JOB_TIMEOUT=${RP_EXTRACTOR_RAG_JOB_TIMEOUT:-14400}
      - RP_EXTRACTOR_RAG_POLL_INTERVAL=${RP_EXTRACTOR_RAG_POLL_INTERVAL:-30}
      - RP_EXTRACTOR_RAG_DATA_HOST=${RAG_DATA_HOST:-${RAG_DATA_PATH:-../rag-service/data}}
      - RP_DOCKER_HOST_GATEWAY=host.docker.internal
      - RP_LOG_LEVEL=INFO
    env_file: .env
    volumes:
      - ${PEPERS_DATA_DIR:-./data}:/data
      - ${RAG_DATA_HOST:-${RAG_DATA_PATH:-../rag-service/data}}:/rag-data
    user: "${PEPERS_UID:-1000}:${PEPERS_GID:-1000}"
    restart: always
    logging: *default-logging
    deploy: *default-deploy
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:${RP_EXTRACTOR_PORT:-8772}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      analyzer:
        condition: service_healthy
        restart: true

  validator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: validator
    init: true
    <<: *runtime-service
    ports:
      - "127.0.0.1:${RP_VALIDATOR_PORT:-8773}:${RP_VALIDATOR_PORT:-8773}"
    environment:
      - RP_VALIDATOR_PORT=${RP_VALIDATOR_PORT:-8773}
      - RP_DB_PATH=/data/research.db
      - RP_VALIDATOR_CAS_URL=${RP_VALIDATOR_CAS_URL:-http://localhost:8769}
      - RP_DOCKER_HOST_GATEWAY=host.docker.internal
      - RP_LOG_LEVEL=INFO
    env_file: .env
    volumes:
      - ${PEPERS_DATA_DIR:-./data}:/data
    user: "${PEPERS_UID:-1000}:${PEPERS_GID:-1000}"
    restart: always
    logging: *default-logging
    deploy: *default-deploy
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:${RP_VALIDATOR_PORT:-8773}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      extractor:
        condition: service_healthy
        restart: true

  codegen:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: codegen
    init: true
    <<: *runtime-service
    ports:
      - "127.0.0.1:${RP_CODEGEN_PORT:-8774}:${RP_CODEGEN_PORT:-8774}"
    environment:
      - RP_CODEGEN_PORT=${RP_CODEGEN_PORT:-8774}
      - RP_DB_PATH=/data/research.db
      - RP_CODEGEN_OLLAMA_URL=${RP_CODEGEN_OLLAMA_URL:-http://localhost:11434}
      - RP_DOCKER_HOST_GATEWAY=host.docker.internal
      - RP_LOG_LEVEL=INFO
      - HOME=/tmp
    env_file: .env
    volumes:
      - ${PEPERS_DATA_DIR:-./data}:/data
    user: "${PEPERS_UID:-1000}:${PEPERS_GID:-1000}"
    restart: always
    logging: *default-logging
    deploy: *default-deploy
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:${RP_CODEGEN_PORT:-8774}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      validator:
        condition: service_healthy
        restart: true

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: orchestrator
    init: true
    <<: *runtime-service
    ports:
      - "127.0.0.1:${RP_ORCHESTRATOR_PORT:-8775}:${RP_ORCHESTRATOR_PORT:-8775}"
    environment:
      - RP_ORCHESTRATOR_PORT=${RP_ORCHESTRATOR_PORT:-8775}
      - RP_DB_PATH=/data/research.db
      - RP_DISCOVERY_URL=http://discovery:${RP_DISCOVERY_PORT:-8770}
      - RP_ANALYZER_URL=http://analyzer:${RP_ANALYZER_PORT:-8771}
      - RP_EXTRACTOR_URL=http://extractor:${RP_EXTRACTOR_PORT:-8772}
      - RP_VALIDATOR_URL=http://validator:${RP_VALIDATOR_PORT:-8773}
      - RP_CODEGEN_URL=http://codegen:${RP_CODEGEN_PORT:-8774}
      - RP_DOCKER_HOST_GATEWAY=host.docker.internal
      - RP_ORCHESTRATOR_CRON=0 8 * * *
      - RP_ORCHESTRATOR_CRON_ENABLED=false
      - RP_ORCHESTRATOR_STAGES_PER_RUN=5
      - RP_ORCHESTRATOR_DEFAULT_QUERY=abs:"Kelly criterion" AND cat:q-fin.*
      - RP_ORCHESTRATOR_CRON_MAX_PAPERS=10
      - RP_ORCHESTRATOR_RETRY_MAX=3
      - RP_ORCHESTRATOR_RETRY_BACKOFF=4.0
      - RP_ORCHESTRATOR_TIMEOUT=300
      - RP_ORCHESTRATOR_ANALYZER_TIMEOUT=1800
      - RP_ORCHESTRATOR_EXTRACTOR_TIMEOUT=15000
      - RP_ORCHESTRATOR_RESUME_STUCK_RUNS=true
      - RP_LOG_LEVEL=INFO
    env_file: .env
    volumes:
      - ${PEPERS_DATA_DIR:-./data}:/data
    user: "${PEPERS_UID:-1000}:${PEPERS_GID:-1000}"
    restart: always
    logging: *default-logging
    deploy: *orchestrator-deploy
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:${RP_ORCHESTRATOR_PORT:-8775}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      codegen:
        condition: service_healthy
        restart: true

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: mcp
    init: true
    <<: *runtime-service
    ports:
      - "127.0.0.1:${RP_MCP_PORT:-8776}:${RP_MCP_PORT:-8776}"
    environment:
      - RP_MCP_PORT=${RP_MCP_PORT:-8776}
      - RP_ORCHESTRATOR_URL=http://orchestrator:${RP_ORCHESTRATOR_PORT:-8775}
      - RP_DOCKER_HOST_GATEWAY=host.docker.internal
      - RP_MCP_FLAVOR=arcade
    env_file: .env
    volumes:
      - ${PEPERS_DATA_DIR:-./data}:/data
    user: "${PEPERS_UID:-1000}:${PEPERS_GID:-1000}"
    restart: always
    logging: *default-logging
    deploy: *default-deploy
    stop_grace_period: 10s
    command: ["python", "-m", "services.mcp"]
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:${RP_MCP_PORT:-8776}/sse')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      orchestrator:
        condition: service_healthy
        restart: true
